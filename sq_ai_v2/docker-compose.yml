version: "3.9"

services:
  # ── Time-series database ─────────────────────────────────────────────────
  questdb:
    image: questdb/questdb:7.4.0
    container_name: sqai_questdb
    restart: unless-stopped
    ports:
      - "9000:9000"   # HTTP / REST
      - "9009:9009"   # ILP (line protocol ingestion)
      - "8812:8812"   # PostgreSQL wire (for psql / SQLAlchemy)
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      QDB_CAIRO_WRITER_DATA_APPEND_PAGE_SIZE: "16777216"

  # ── Relational / fundamental database ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sqai_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sqai}
      POSTGRES_USER: ${POSTGRES_USER:-sqai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sqai_secret}

  # ── Cache / message queue ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: sqai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  # ── Metrics collection ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sqai_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ── Visualization ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: sqai_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/sqai.json
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus

volumes:
  questdb_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
