# Hard caps & cadence
max_universe_size: 200
screener_top_n: 10
screener_interval_minutes: 30        # DeepSeek pre-filter
decision_interval_minutes: 5         # Claude decision loop
universe_refresh_hour: 7             # IST – reserved for future re-fetch
ensemble_threshold_percent: 10.0     # claude size_pct above which veto fires

# Risk
daily_loss_limit_pct: 4.0
max_exposure_pct: 50.0
target_vol_pct: 15.0
max_position_pct: 10.0
atr_stop_mult: 2.0
atr_target_mult: 3.0
time_stop_bars: 20
